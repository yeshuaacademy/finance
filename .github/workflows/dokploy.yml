# Build Docker image on GitHub → push to GHCR → trigger Dokploy redeploy.
#
# Required GitHub secrets:
#   DOKPLOY_WEBHOOK_TOKEN  — Dokploy app → Deployments → Webhook token (refreshToken)
#   DOKPLOY_URL            — https://dokploy.prochat.tools

name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.DOKPLOY_URL }}/api/deploy/${{ secrets.DOKPLOY_WEBHOOK_TOKEN }}")

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "Dokploy trigger failed with status $RESPONSE"
            exit 1
          fi

          echo "Deployment triggered successfully."
